openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: improve
    description: AI text improvement operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /improve:
    post:
      operationId: improveText
      tags: [improve]
      summary: Improve text using AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImproveTextBody"
      responses:
        "200":
          description: SSE stream of improved text chunks
          content:
            text/event-stream: {}
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImproveError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImproveError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ImproveTextBody:
      type: object
      properties:
        text:
          type: string
          description: The text to be improved
        mode:
          type: string
          enum: [professional, summarize, simplify]
          description: The improvement mode to apply
      required:
        - text
        - mode
    ImproveError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
